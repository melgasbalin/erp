<!-- src/app/search/search.html -->
<div class="container">
  
    <app-sidebar
    [isOpen]="isSidebarOpen"
    [user]="user"
    (toggled)="toggleSidebar()">
  </app-sidebar>

  <div class="search-section">
    <h2>Buscar Registros</h2>
    <div class="search-controls">
      <input 
        type="text" 
        [(ngModel)]="filtros.search" 
        (keyup)="filtrarRegistros()"
        placeholder="Buscar por nombre, email o teléfono..."
        class="form-control search-input"
      />
      <button class="btn btn-primary" (click)="actualizarTabla()">
        ✅ Actualizar
      </button>
    </div>
  </div>

  <div class="table-section">
    <h3>Lista de Registros</h3>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let registro of displayedRegistros">
            <td>{{ registro.id }}</td>
            <td>{{ registro.nombre }}</td>
            <td>{{ registro.email }}</td>
            <td>{{ registro.telefono }}</td>
            <td class="actions-column">
              <button 
                (click)="editarRegistro(registro.id)" 
                class="btn btn-primary btn-sm"
                title="Editar">
                ✏️ Editar
              </button>
              <button 
                (click)="eliminarRegistro(registro.id)" 
                class="btn btn-danger btn-sm"
                title="Eliminar">
                🗑️ Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Mensaje cuando no hay resultados -->
      <div *ngIf="displayedRegistros.length === 0" class="no-results">
        No se encontraron registros que coincidan con la búsqueda.
      </div>
    </div>
  </div>
</div>
